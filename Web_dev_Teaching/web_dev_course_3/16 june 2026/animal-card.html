<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            background-color: darkgreen;
        }
        .animal-box{
            width: 280px;
            border: 2px solid yellow;
            margin: 60px;
            padding: 30px;
            background-color:darkorange;
            border-radius: 4px;

        }
        .animal-title{
            font-size: 30px;
            color: forestgreen;
            text-decoration: underline;

        }
        .details{
            color: rgb(35, 2, 106);
        }
        .fun-fact{
            color: rgb(255, 251, 0);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="animal-box">
        <h2 class="animal-title">Snow leopard</h2>
        <p class="details">Type : Big cat</p>
        <p class="details">Food : Deers, sheep and Goats</p>
        <p class="details">Lives in : In mountains of south asia</p>
        <p class="details">speed : they can reach top speeds of 40 mph (64 km/h) </p>
        <p class="fun-fact">Cool Fact: In a single jump it can cover leap of 15  meter</p>


    </div>
    
</body>
</html>
