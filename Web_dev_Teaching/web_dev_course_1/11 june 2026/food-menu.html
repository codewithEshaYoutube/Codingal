<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food menu</title>

    <style>
        body{
            background-color: rgb(237, 190, 104);
            width: 300px;
        }
        h1+p{
            padding: 10px 20px;
            background: #ffe0b2;
            color: #bf360c;
            border-radius: 8px;
          
        }
        ul{
           padding: 0px; 
           margin-top: 20px;
        }
        ul>li{
            list-style: none;
            margin: 6px auto;
            padding: 10px 20px;
            color: black;
            font-weight: bold;
            background-color: #fff3e0;
            width: 150px;

        }
        a{
            background-color: #bf360c;
            color: #fff3e0;
            padding: 8px 18px;
        }
        a:hover{
            background-color: black;
            color: green;
        }


    </style>
</head>
<body>
    <!--  siblings relationship-->
    <h1>Food Menu</h1>
    <p>You can pick whatever you like</p>
    <!--- parent child-->
    <ul>
        <li>Pizza</li>
        <li>Loaded Fries</li>
        <li>Zinger Burger</li>
        <li>Icecream</li>
    </ul>
    <!--hover effect-->
    <a href="#">Order Now</a>
    <a href="#">See more</a>
</body>
</html>
