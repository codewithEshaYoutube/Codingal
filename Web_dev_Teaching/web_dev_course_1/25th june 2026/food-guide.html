<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(247, 218, 165);
            padding: 10px;
            text-align: center;
        }
        h2{
            color: chocolate;
            font-weight: bold;
            cursor: pointer;
        }
        blockquote{
            border-left: 4px solid chocolate;
            text-align: center;
            font-style: italic;
            display: inline-block;
            color: dimgray;
            padding-right: 15px;
        }

    </style>
</head>
<body>
    
    <p class="display-1">My food diary</p>
    <p class="display-2">Top dishes</p>
    <p class="display-3">Fun food facts</p>
    <p class="display-4">Food Guide <small>by esha</small></p>
    <hr>
    <h2>Did you Know?</h2>
    <p>Pizza is the most <mark>popular</mark> food order by kids and adult in whole world</p>
    <hr>
    <h2>Cooking style</h2>
    <p>My favourite cooking way is to cook <abbr title="Barbeque">BBQ</abbr> with family on sunny day</p>
    <hr>
    <h2>Food quote</h2>
    <blockquote class="blockquote">
        <p class="mb-0">First we eat, then we do everthing else</p>
        <footer class="blockquote-footer">by M.F.k Fisher</footer>

    </blockquote>

</body>
</html>
