<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(244, 180, 61);
        }
        
        h1+p{    
            background: #ffe0b2;
            padding: 10px 20px;
            border-radius: 8px;
            color: #bf360c;
            display: inline-block;
        }
        ul>li{
            list-style: none;
            font-size: 18px;
            font-weight: bold;
            width: 600px;
            background-color: #f5a68e;
            border-radius: 4px;

        }
        a{
           color: #bf360c;
           padding: 8px 18px; 
           border-radius: 4px solid grey;
        }
        a:hover{
            background: #ffe0b2;
            color: black;
        }
    </style>
</head>
<body>
    <h1>Food Menu</h1>
    <p>Pick your favorite dish and dig in</p>
    <ul>
        <li>
            Pizza
        </li>
        <li>
            Burger
        </li>
        <li>
            cold Drink
        </li>
        <li>
            Stake
        </li>
    </ul>
    <p>Every dish on this menu is made with love</p>
    <div class="links">
        <a href="#">Order Now</a>
         <a href="#">See more
         </a>


    </div>

</body>
</html>
