<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: darkgreen;
        }
        .animal-title{
            font-size: 30px;
            text-decoration: underline;
            color: forestgreen;
            padding-bottom: 25px;

        }
        .animal-box{
            background-color: lightyellow;
            width: 280px;
            margin: 50px;
            border: 3px solid rgb(251, 255, 0);
            padding: 30px;
            border-radius: 4px;

        }
        .details{
            color: rgb(4, 59, 4);

        }
        .cool-fact{
            color: darkorange;
            font-style: italic;
        }

    </style>
</head>
<body>
    <div class="animal-box">
    <h2 class="animal-title">Snow leopard</h2>
    <p class="details">Type: Big Cat</p>
    <p class="details">Lives in : Mountains of central Asia</p>
    <p class="details">Food :Deer Goat and white sheep</p>
    <p class="cool-fact">Fun fact: They can leap over 15 meters in one jump</p>
    </div>
</body>
</html>
