<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            background-color: rgb(247, 223, 192);
        }
        .card{
            background-color: rgb(221, 255, 0);
        }
        .heading{
            text-decoration: underline;
            text-transform: capitalize;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 40px;
            text-shadow: 3px 3px grey;
        }
        .sub-heading{
            text-decoration: underline;
            font-weight: bold;
            color: blue;
            transform: rotate(6deg);

        }
        .properties{
            font-size: medium;
            color: green;
        }
    </style>
</head>
<body>
    <div class="card">
    <h1 class="heading">Thunder Kid</h1>
    <p>This is the most powerful hero in school</p>
    <h2 class="sub-heading"> super powers </h2>
    <p class="properties">He can run faster than cheetah</p>
    <p class="properties">He can lift heavy objects</p>
    <h2 class="sub-heading"> weakness</h2>
    <p class="properties">he is afraid of water</p>
    <p class="properties">he is weak in maths</p>
    </div>


    
</body>
</html>
